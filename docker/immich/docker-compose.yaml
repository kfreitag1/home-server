services:
    immich-server:
        container_name: immich_server
        image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
        extends:
            file: hwaccel.transcoding.yml
            service: vaapi
        devices:
            - /dev/dri:/dev/dri
        environment:
            - LIBVA_DRIVER_NAME=radeonsi
        volumes:
            - ${UPLOAD_LOCATION}:/data
            - ${THUMB_LOCATION}:/data/thumbs
            - /etc/localtime:/etc/localtime:ro
            - /run/agenix/immich-db-pass:/run/secrets/immich-db-pass:ro
        env_file:
            - .env
        depends_on:
            - redis
            - database
        restart: always
        healthcheck:
            disable: false
        networks:
            - default
            - caddy_network
        labels:
            caddy: photos.kfreitag.ca
            caddy.reverse_proxy: "{{upstreams 2283}}"

    immich-machine-learning:
        container_name: immich_machine_learning
        # image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-rocm
        image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
        # extends:
        #   file: hwaccel.ml.yml
        #   service: rocm
        # environment:
        #   - hsa_override_gfx_version=11.0.0
        volumes:
            - model-cache:/cache
            - /run/agenix/immich-db-pass:/run/secrets/immich-db-pass:ro
        env_file:
            - .env
        restart: always
        healthcheck:
            disable: false

    redis:
        container_name: immich_redis
        image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
        healthcheck:
            test: redis-cli ping || exit 1
        restart: always

    database:
        container_name: immich_postgres
        image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
        environment:
            POSTGRES_PASSWORD_FILE: ${DB_PASSWORD_FILE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_DB: ${DB_DATABASE_NAME}
            POSTGRES_INITDB_ARGS: "--data-checksums"
        volumes:
            - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
            - /run/agenix/immich-db-pass:/run/secrets/immich-db-pass:ro
        shm_size: 128mb
        restart: always

volumes:
    model-cache:

networks:
    caddy_network:
        external: true
