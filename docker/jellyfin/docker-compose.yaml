services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    # ports:
    #   - 8096:8096/tcp
    #   - 7359:7359/udp
    volumes:
      - ./config:/config
      # - /path/to/cache:/cache
      - type: bind
        source: /mnt/storage/media
        target: /media
        read_only: true
      # Optional - extra fonts to be used during transcoding with subtitle burn-in
      # - type: bind
      #   source: /path/to/fonts
      #   target: /usr/local/share/fonts/custom
      #   read_only: true
    restart: 'always'
    networks:
      - caddy_network
    # environment:
    #   - JELLYFIN_PublishedServerUrl=https://watch.kfreitag.ca

networks:
  caddy_network:
    external: true
