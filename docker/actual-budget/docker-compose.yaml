services:
  actual_server:
    container_name: actual-budget
    image: docker.io/actualbudget/actual-server:latest
    # ports:
    #   - '5006:5006'
    # environment:
      # - ACTUAL_HTTPS_KEY=/data/selfhost.key
      # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
      # - ACTUAL_PORT=5006
      # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
    environment:
      - ACTUAL_OPENID_DISCOVERY_URL=https://id.kfreitag.ca/.well-known/openid-configuration
      - ACTUAL_OPENID_SERVER_HOSTNAME=https://budget.kfreitag.ca
      - ACTUAL_OPENID_CLIENT_ID=fa46e1d0-d0c5-4677-805e-9fe947bbb02c
      - ACTUAL_OPENID_ENFORCE=true
      - ACTUAL_LOGIN_METHOD=openid
      - ACTUAL_ALLOWED_LOGIN_METHODS=openid
      - DEBUG=actual:config
    volumes:
      - ./data:/data
      - /run/agenix/actual-budget-oidc-secret:/run/secrets/actual-budget-oidc-secret:ro
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always
    networks: 
      - caddy_network
    command: >
        sh -c '
        export ACTUAL_OPENID_CLIENT_SECRET=$$(cat /run/secrets/actual-budget-oidc-secret)
        && exec node app.js
        '
networks:
  caddy_network:
    external: true